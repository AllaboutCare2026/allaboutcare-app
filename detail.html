<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All About Care</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f7f2eb;color:#3d3128;}
.topbar{background:#fffaf5;padding:22px 28px;border-bottom:1px solid #eadfce;}
.container{padding:28px;max-width:1100px;margin:auto;}
.card{background:#fffaf5;padding:20px;border-radius:18px;margin-bottom:18px;box-shadow:0 8px 24px rgba(80,58,39,.08);}
.title{font-size:24px;font-weight:700;margin-bottom:10px;}
.link{display:block;padding:8px 0;color:#1459c7;text-decoration:none;}
</style>
</head>
<body>

<div class="topbar">
<a href="javascript:history.back()">← Zurück</a>
</div>

<div class="container">
<div id="content">Inhalte werden geladen ...</div>
</div>

<script>
function getParam(name){
return new URLSearchParams(window.location.search).get(name);
}

async function load(){
const board=getParam("board");
const section=getParam("section");
const content=document.getElementById("content");

try{
const res=await fetch("/api/boards?id="+board);
const data=await res.json();

const posts=(data.posts||[]).filter(x=>x.sectionId==section);

let html="";

posts.forEach(post=>{
html+=`<div class="card">`;
html+=`<div class="title">${post.title||"Eintrag"}</div>`;
html+=`<div>${post.body||""}</div>`;

if(post.attachments){
post.attachments.forEach(file=>{
html+=`<a class="link" href="${file.url}" target="_blank">📄 ${file.name||"Datei öffnen"}</a>`;
});
}

html+=`</div>`;
});

content.innerHTML=html || "Keine Inhalte gefunden.";

}catch(e){
content.innerHTML="Fehler beim Laden.";
}
}

load();
</script>

</body>
</html>
