<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
<style>
body{font-family:Arial,sans-serif;padding:20px;background:#f7f2eb;}
pre{background:white;padding:15px;border-radius:12px;overflow:auto;}
</style>
</head>
<body>
<div id="content">Lädt ...</div>

<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

async function load(){
  const board = getParam("board");
  const section = getParam("section");
  const content = document.getElementById("content");

  try{
    const res = await fetch("/api/boards?id=" + board);
    const data = await res.json();
    const posts = (data.posts || []).filter(x => x.sectionId == section);
    content.innerHTML = "<pre>" + JSON.stringify(posts, null, 2) + "</pre>";
  }catch(e){
    content.textContent = "Fehler beim Laden.";
  }
}

load();
</script>
</body>
</html>
