<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All About Care</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f7f2eb;
  color:#3d3128;
}

.topbar{
  background:#fffaf5;
  padding:22px 28px;
  border-bottom:1px solid #eadfce;
}

.container{
  padding:28px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:#fffaf5;
  padding:22px;
  border-radius:18px;
  margin-bottom:18px;
  box-shadow:0 8px 24px rgba(80,58,39,.08);
}

.title{
  font-size:24px;
  font-weight:700;
  margin-bottom:12px;
}

.text{
  line-height:1.5;
  margin-bottom:14px;
}

.link{
  display:inline-block;
  background:#1459c7;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="topbar">
<a href="javascript:history.back()">← Zurück</a>
</div>

<div class="container">
<div id="content">Inhalte werden geladen ...</div>
</div>

<script>
function getParam(name){
  return new URLSearchParams(window.location.search).get(name);
}

function esc(text){
  return String(text || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;");
}

async function load(){

  const board = getParam("board");
  const section = getParam("section");
  const content = document.getElementById("content");

  try{

    const res = await fetch("/api/boards?id=" + board);
    const data = await res.json();

    const posts = (data.posts || []).filter(
      p => String(p.sectionId) === String(section)
    );

    let html = "";

    posts.forEach(post => {

      const t = post.text || {};

      const title =
        t.subject ||
        post.title ||
        "Eintrag";

      const text =
        t.bodyHtml || "";

      const link =
        (t.attachment && t.attachment.url)
        ? t.attachment.url
        : post.url;

      html += `
        <div class="card">
          <div class="title">${esc(title)}</div>

          ${text ? `<div class="text">${text}</div>` : ""}

          ${link ? `<a class="link" href="${link}" target="_blank">Öffnen</a>` : ""}
        </div>
      `;
    });

    content.innerHTML = html || "Keine Inhalte gefunden.";

  }catch(e){
    content.innerHTML = "Fehler beim Laden.";
  }
}

load();
</script>

</body>
</html>
