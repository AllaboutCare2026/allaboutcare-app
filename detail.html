<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All About Care</title>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#f7f2eb;
      color:#3d3128;
    }

    .topbar{
      background:#fffaf5;
      padding:22px 28px;
      border-bottom:1px solid #eadfce;
    }

    .container{
      padding:28px;
      max-width:1100px;
      margin:auto;
    }

    .card{
      background:#fffaf5;
      padding:20px;
      border-radius:18px;
      margin-bottom:18px;
      box-shadow:0 8px 24px rgba(80,58,39,.08);
    }

    .title{
      font-size:22px;
      font-weight:700;
      margin-bottom:10px;
    }

    .text{
      margin:10px 0;
      line-height:1.5;
      white-space:pre-line;
      word-break:break-word;
    }

    .debug{
      margin-top:14px;
      padding:14px;
      background:#f4eee7;
      border-radius:12px;
      font-family:monospace;
      font-size:13px;
      line-height:1.45;
      white-space:pre-wrap;
      overflow-x:auto;
    }

    .link{
      display:block;
      padding:8px 0;
      color:#1459c7;
      text-decoration:none;
      word-break:break-word;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <a href="javascript:history.back()">← Zurück</a>
  </div>

  <div class="container">
    <div id="content">Inhalte werden geladen ...</div>
  </div>

  <script>
    function getParam(name){
      return new URLSearchParams(window.location.search).get(name);
    }

    function esc(text){
      return String(text || "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;");
    }

    function cut(obj){
      try{
        return JSON.stringify(obj, null, 2).slice(0, 3000);
      }catch(e){
        return "JSON konnte nicht dargestellt werden.";
      }
    }

    async function load(){
      const board = getParam("board");
      const section = getParam("section");
      const content = document.getElementById("content");

      if (!board){
        content.innerHTML = `
          <div class="card">
            <div class="title">Fehler</div>
            <div class="text">Keine Board-ID gefunden.</div>
          </div>
        `;
        return;
      }

      try{
        const response = await fetch("/api/boards?id=" + encodeURIComponent(board));
        const data = await response.json();

        const allPosts = Array.isArray(data.posts) ? data.posts : [];

        const posts = section
          ? allPosts.filter(post => String(post.sectionId || "") === String(section))
          : allPosts;

        if (!posts.length){
          content.innerHTML = `
            <div class="card">
              <div class="title">Keine Inhalte gefunden</div>
              <div class="text">Für diese section wurden keine Einträge gefunden.</div>
            </div>
          `;
          return;
        }

        let html = "";

        posts.forEach((post, index) => {
          html += `
            <div class="card">
              <div class="title">Eintrag ${index + 1}</div>
              <div class="text"><strong>title:</strong> ${esc(post.title)}</div>
              <div class="text"><strong>subject:</strong> ${esc(post.subject)}</div>
              <div class="text"><strong>text:</strong> ${esc(typeof post.text === "string" ? post.text : JSON.stringify(post.text))}</div>
              <div class="text"><strong>url:</strong> ${esc(post.url)}</div>
              <div class="text"><strong>sectionId:</strong> ${esc(post.sectionId)}</div>
              <div class="text"><strong>attachments:</strong> ${esc(JSON.stringify(post.attachments))}</div>
              <div class="debug">${esc(cut(post))}</div>
            </div>
          `;
        });

        content.innerHTML = html;

      } catch(error){
        content.innerHTML = `
          <div class="card">
            <div class="title">Fehler beim Laden</div>
            <div class="text">${esc(error.message || String(error))}</div>
          </div>
        `;
      }
    }

    load();
  </script>

</body>
</html>
