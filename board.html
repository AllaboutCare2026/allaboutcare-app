<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All About Care</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f7f2eb;
color:#3d3128;
}

.topbar{
background:#fffaf5;
border-bottom:1px solid #eadfce;
padding:22px 28px;
position:sticky;
top:0;
z-index:10;
}

.back-link{
display:inline-block;
margin-bottom:12px;
text-decoration:none;
color:#8a7463;
font-size:15px;
}

.title{
margin:0;
font-size:32px;
font-weight:700;
color:#5b4636;
}

.subtitle{
margin-top:6px;
font-size:15px;
color:#8a7463;
}

.container{
padding:28px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
}

.card{
display:block;
text-decoration:none;
color:inherit;
background:#fffaf5;
border-radius:22px;
overflow:hidden;
box-shadow:0 8px 24px rgba(80,58,39,.08);
min-height:230px;
border:1px solid #eee2d4;
}

.card:hover{
transform:translateY(-4px);
transition:.2s;
}

.card-color{
height:170px;
padding:18px;
display:flex;
align-items:flex-end;
}

.card-title-big{
color:white;
font-size:26px;
font-weight:700;
line-height:1.2;
}

.card-body{
padding:18px;
}

.card-text{
margin:0;
font-size:15px;
color:#866f5f;
}

.loading,.error{
font-size:18px;
padding:24px 0;
color:#7a6556;
}

@media (max-width:1100px){
.grid{grid-template-columns:repeat(3,1fr);}
}

@media (max-width:800px){
.grid{grid-template-columns:repeat(2,1fr);}
}

@media (max-width:560px){
.grid{grid-template-columns:1fr;}
.container{padding:18px;}
.topbar{padding:18px;}
}
</style>
</head>

<body>

<header class="topbar">
<a class="back-link" href="index.html">← Zurück zur Übersicht</a>
<h1 id="pageTitle" class="title">Bereich</h1>
<div class="subtitle">Kategorien</div>
</header>

<main class="container">
<div id="status" class="loading">Kacheln werden geladen ...</div>
<div id="grid" class="grid" style="display:none;"></div>
</main>

<script>
const colors=[
"#d9a98f","#b7c9a8","#e7c89b","#c8b6d8",
"#9fc7c1","#e6b8b7","#d4c29a","#a8bfd8"
];

function getId(){
const p=new URLSearchParams(window.location.search);
return p.get("id");
}

function esc(t){
return String(t||"")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

function createCard(section,index,boardId){
const color=colors[index%colors.length];

return `
<a class="card" href="detail.html?board=${boardId}&section=${section.id}">
<div class="card-color" style="background:${color}">
<div class="card-title-big">${esc(section.title)}</div>
</div>
<div class="card-body">
<p class="card-text">${section.count} Einträge</p>
</div>
</a>
`;
}

async function load(){

const status=document.getElementById("status");
const grid=document.getElementById("grid");
const pageTitle=document.getElementById("pageTitle");
const boardId=getId();

if(!boardId){
status.className="error";
status.textContent="Keine ID gefunden";
return;
}

try{

const me=await fetch("/api/me");
const meData=await me.json();

if(meData.boards){
const current=meData.boards.find(x=>x.id===boardId);
if(current){pageTitle.textContent=current.title;}
}

const res=await fetch("/api/boards?id="+boardId);
const data=await res.json();

const posts=Array.isArray(data.posts)?data.posts:[];
const apiSections=Array.isArray(data.sections)?data.sections:[];

const countMap=new Map();

posts.forEach(post=>{
const sid=post.sectionId||"";
if(!sid)return;
countMap.set(sid,(countMap.get(sid)||0)+1);
});

let sections=[];

sections=apiSections
.map(sec=>({
id:sec.id,
title:sec.title || "Ohne Titel",
count:countMap.get(sec.id) || 0
}))
.filter(x=>x.count>0)
.sort((a,b)=>a.title.localeCompare(b.title,"de"));

grid.innerHTML=sections.map((s,i)=>createCard(s,i,boardId)).join("");

status.style.display="none";
grid.style.display="grid";

}catch(e){
status.className="error";
status.textContent="Kacheln konnten nicht geladen werden.";
}

}

load();
</script>

</body>
</html>
