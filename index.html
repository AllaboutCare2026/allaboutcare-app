<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All About Care</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,sans-serif;
background:#f7f2eb;
color:#3d3128;
}

.topbar{
background:#fffaf5;
border-bottom:1px solid #eadfce;
padding:22px 28px;
position:sticky;
top:0;
z-index:10;
}

.title{
margin:0;
font-size:34px;
font-weight:700;
color:#5b4636;
}

.subtitle{
margin-top:6px;
font-size:15px;
color:#8a7463;
}

.container{
padding:28px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:24px;
}

.card{
display:block;
text-decoration:none;
color:inherit;
background:#fffaf5;
border-radius:22px;
overflow:hidden;
box-shadow:0 8px 24px rgba(80,58,39,.08);
border:1px solid #eee2d4;
min-height:290px;
}

.card:hover{
transform:translateY(-4px);
transition:.2s;
}

.card-color{
height:190px;
padding:18px;
display:flex;
align-items:flex-end;
}

.card-title-big{
color:white;
font-size:24px;
font-weight:700;
line-height:1.2;
}

.card-body{
padding:18px;
}

.card-title{
margin:0 0 8px 0;
font-size:22px;
font-weight:700;
}

.card-text{
margin:0;
font-size:15px;
color:#866f5f;
}

.loading,.error{
font-size:18px;
padding:24px 0;
color:#7a6556;
}

@media (max-width:1100px){
.grid{grid-template-columns:repeat(3,1fr);}
}

@media (max-width:800px){
.grid{grid-template-columns:repeat(2,1fr);}
}

@media (max-width:560px){
.grid{grid-template-columns:1fr;}
.container{padding:18px;}
.topbar{padding:18px;}
}
</style>
</head>

<body>

<header class="topbar">
<h1 class="title">All About Care</h1>
<div class="subtitle">Übersicht</div>
</header>

<main class="container">
<div id="status" class="loading">Kacheln werden geladen ...</div>
<div id="grid" class="grid" style="display:none;"></div>
</main>

<script>
const colors=[
"#d9a98f","#b7c9a8","#e7c89b","#c8b6d8",
"#9fc7c1","#e6b8b7","#d4c29a","#a8bfd8",
"#d9bfa7","#b8d8c1"
];

function esc(t){
return String(t||"")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;");
}

function createCard(board,index){
const color=colors[index%colors.length];
const title=esc(board.title || "Ohne Titel");

return `
<a class="card" href="board.html?id=${encodeURIComponent(board.id)}">
<div class="card-color" style="background:${color}">
<div class="card-title-big">${title}</div>
</div>
<div class="card-body">
<h2 class="card-title">${title}</h2>
<p class="card-text">Weiter</p>
</div>
</a>
`;
}

function extractNumber(title){
const match=String(title).match(/^(\d+)/);
return match ? parseInt(match[1],10) : 999;
}

async function loadBoards(){

const status=document.getElementById("status");
const grid=document.getElementById("grid");

try{

const response=await fetch("/api/me");
const data=await response.json();

if(!data.boards || !Array.isArray(data.boards)){
throw new Error();
}

const boards=data.boards.slice(0,50);

boards.sort((a,b)=>{
const na=extractNumber(a.title);
const nb=extractNumber(b.title);

if(na!==nb) return na-nb;

return a.title.localeCompare(b.title,"de");
});

grid.innerHTML=boards.map(createCard).join("");

status.style.display="none";
grid.style.display="grid";

}catch(e){

status.className="error";
status.textContent="Die Kacheln konnten nicht geladen werden.";

}

}

loadBoards();
</script>

</body>
</html>
