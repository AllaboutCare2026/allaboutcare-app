<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All About Care</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f1ea;
      color: #1f1f1f;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 60px 20px;
    }

    h1 {
      font-size: 48px;
      margin: 0 0 14px;
    }

    .lead {
      font-size: 20px;
      line-height: 1.6;
      color: #555;
      max-width: 800px;
      margin-bottom: 40px;
    }

    .status {
      margin-bottom: 24px;
      color: #666;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 22px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: white;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.06);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 30px rgba(0,0,0,0.10);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.3;
    }

    .card p {
      margin: 0;
      color: #5b5b5b;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>All About Care</h1>
    <p class="lead">
      Diese Bereiche werden automatisch aus eurem Padlet geladen.
    </p>

    <div id="status" class="status">Lade Bereiche …</div>
    <div id="grid" class="grid"></div>
  </div>

  <script>
    async function loadBoards() {
      const status = document.getElementById("status");
      const grid = document.getElementById("grid");

      try {
        const res = await fetch("/api/boards");
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Fehler beim Laden");
        }

        const boards = data.boards || [];

        status.textContent = boards.length
          ? ""
          : "Keine Bereiche gefunden.";

        grid.innerHTML = boards.map(board => `
          <a class="card" href="/board.html?id=${encodeURIComponent(board.id)}&title=${encodeURIComponent(board.title)}">
            <h2>${escapeHtml(board.title)}</h2>
            <p>Bereich öffnen</p>
          </a>
        `).join("");
      } catch (error) {
        status.textContent = "Bereiche konnten nicht geladen werden.";
        console.error(error);
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loadBoards();
  </script>
</body>
</html>
