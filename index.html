<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Wissensseite</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f5f6fa;
      color: #222;
    }

    header {
      background: #ffffff;
      padding: 24px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    main {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px 40px;
    }

    .info-box {
      background: #ffffff;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .info-box p {
      margin: 0;
      line-height: 1.5;
    }

    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 22px;
    }

    .card p {
      margin-top: 0;
      line-height: 1.5;
    }

    .links {
      margin-top: 14px;
      padding-left: 20px;
    }

    .links li {
      margin-bottom: 10px;
    }

    .links a {
      color: #1459c7;
      text-decoration: none;
      word-break: break-word;
    }

    .links a:hover {
      text-decoration: underline;
    }

    .loading,
    .error,
    .empty {
      background: #ffffff;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
  </style>
</head>
<body>
  <header>
    <h1>Meine Wissensseite</h1>
  </header>

  <main>
    <div class="info-box">
      <p>
        Diese Seite lädt die Inhalte automatisch aus deinem Padlet.
        Änderungen im Padlet werden nach dem Neuladen der Seite übernommen.
      </p>
    </div>

    <div id="content" class="loading">Inhalte werden geladen ...</div>
  </main>

  <script>
    const boardId = "HIER_DEINE_BOARD_ID_EINTRAGEN";
    const apiUrl = `/api/boards?id=${boardId}`;
    const content = document.getElementById("content");

    function extractLinksFromText(text) {
      if (!text) return [];
      const regex = /(https?:\/\/[^\s"<]+)/g;
      return text.match(regex) || [];
    }

    function renderPosts(posts) {
      if (!posts || posts.length === 0) {
        content.className = "empty";
        content.innerHTML = "Keine Inhalte gefunden.";
        return;
      }

      content.className = "";
      content.innerHTML = "";

      posts.forEach((post) => {
        const card = document.createElement("div");
        card.className = "card";

        const title = document.createElement("h2");
        title.textContent = post.title || "Ohne Titel";
        card.appendChild(title);

        if (post.body) {
          const text = document.createElement("p");
          text.textContent = post.body;
          card.appendChild(text);
        }

        const allLinks = [];

        const textLinks = extractLinksFromText(post.body);
        textLinks.forEach((link) => {
          allLinks.push({
            name: link,
            url: link
          });
        });

        if (post.attachments && Array.isArray(post.attachments)) {
          post.attachments.forEach((file) => {
            if (file.url) {
              allLinks.push({
                name: file.name || "Datei öffnen",
                url: file.url
              });
            }
          });
        }

        if (allLinks.length > 0) {
          const list = document.createElement("ul");
          list.className = "links";

          allLinks.forEach((item) => {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = item.url;
            a.target = "_blank";
            a.rel = "noopener noreferrer";
            a.textContent = item.name;
            li.appendChild(a);
            list.appendChild(li);
          });

          card.appendChild(list);
        }

        content.appendChild(card);
      });
    }

    async function loadPadletContent() {
      try {
        const response = await fetch(apiUrl);

        if (!response.ok) {
          throw new Error("API konnte nicht geladen werden.");
        }

        const data = await response.json();

        if (!data || !data.posts) {
          throw new Error("Keine gültigen Daten erhalten.");
        }

        renderPosts(data.posts);
      } catch (error) {
        content.className = "error";
        content.innerHTML = "Fehler beim Laden der Inhalte.";
        console.error(error);
      }
    }

    loadPadletContent();
  </script>
</body>
</html>
