<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Wissensseite</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
padding:0;
background:#f4f6f8;
color:#222;
}

header{
background:white;
padding:25px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

h1{
margin:0;
}

main{
max-width:1000px;
margin:30px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.card h2{
margin-top:0;
}

a{
color:#1459c7;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}
</style>
</head>

<body>

<header>
<h1>Meine Wissensseite</h1>
</header>

<main>
<div id="content">Inhalte werden geladen ...</div>
</main>

<script>
const boardId = "l0flghcaccsctf3a";

fetch(`/api/boards?id=${boardId}`)
.then(response => response.json())
.then(data => {

let html = "";

if(data.posts && data.posts.length > 0){

data.posts.forEach(post => {

html += `
<div class="card">
<h2>${post.title || "Ohne Titel"}</h2>
<p>${post.body || ""}</p>
</div>
`;

});

}else{
html = "<div class='card'>Keine Inhalte gefunden.</div>";
}

document.getElementById("content").innerHTML = html;

})
.catch(error => {
document.getElementById("content").innerHTML =
"<div class='card'>Fehler beim Laden.</div>";
});
</script>

</body>
</html>
